server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties],optional:file:decp-backend/.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8081,http://localhost:19000,exp://localhost:19000}
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  uploads:
    dir: ${UPLOADS_DIR:uploads}
  expo:
    push-url: https://exp.host/--/api/v2/push/send
